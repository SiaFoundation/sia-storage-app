[workspace]
resolver = "2"
members = ["sia-storage-core"]

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
publish = false

[workspace.dependencies]
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

[workspace.lints.rust]
unused_imports = "warn"

[workspace.lints.clippy]
module_inception = "allow"
too_many_arguments = "allow"
