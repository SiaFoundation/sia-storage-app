[package]
name = "sia-storage-core"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
chrono.workspace = true
hex.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

[features]
# Exposes the cfg-gated test-fixture constructors (e.g. FileRecordRow::test) to
# other crates' tests. This crate's own inline tests reach them via cfg(test).
test-fixtures = []

[lints]
workspace = true

[lib]
# No doc examples; the doctest pass is a full rustdoc recompile for nothing. Re-enable if doc examples are added.
doctest = false
