appId: sia.storage.dev
env:
  E2E_CONNECT_KEY: '${E2E_CONNECT_KEY}'
---
# Sia Storage - Upload Packing E2E Test
# Tests that multiple files uploaded quickly are packed together into batches

# iOS: Clear keychain to remove saved seed
- runFlow:
    when:
      platform: iOS
    commands:
      - clearKeychain

- launchApp:
    clearState: true

# Expo dev client - connect to dev server
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: 'http://localhost:8081'
          timeout: 10000
      - tapOn:
          text: 'http://localhost:8081'
- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible:
            text: 'http://10.0.2.2:8081'
          timeout: 30000
      - tapOn:
          text: 'http://10.0.2.2:8081'

# Wait for bundling, dismiss dev menu popups
- extendedWaitUntil:
    visible:
      text: 'Continue'
    timeout: 60000
- tapOn:
    text: 'Continue'
- extendedWaitUntil:
    visible:
      text: 'Go home'
    timeout: 5000
- tapOn:
    point: '93%,40%'

# Welcome screen
- extendedWaitUntil:
    visible:
      id: 'welcome-title'
    timeout: 15000
- tapOn:
    id: 'welcome-get-started-button'

# Indexer selection
- extendedWaitUntil:
    visible:
      id: 'indexer-title'
    timeout: 10000
- tapOn:
    id: 'indexer-authorize-button'

# Auth WebView
- extendedWaitUntil:
    visible:
      text: 'App password'
    timeout: 20000
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: 'Enter your app password'
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          id: 'appPassword'
- inputText: '${E2E_CONNECT_KEY}'
- extendedWaitUntil:
    visible:
      text: 'Accept'
    timeout: 5000
- tapOn:
    point: '50%,20%'
- tapOn:
    text: 'Accept'
- extendedWaitUntil:
    visible:
      text: 'Connection approved'
    timeout: 30000
- tapOn:
    text: 'Return to app'

# Recovery phrase - create new account
- extendedWaitUntil:
    visible:
      id: 'recovery-title'
    timeout: 15000
- tapOn:
    id: 'recovery-generate-button'
- extendedWaitUntil:
    visible:
      id: 'recovery-phrase-text'
    timeout: 5000
- tapOn:
    id: 'recovery-checkbox'
- tapOn:
    id: 'recovery-continue-button'

# Finished screen
- extendedWaitUntil:
    visible:
      id: 'finished-title'
    timeout: 15000
- tapOn:
    id: 'finished-upload-button'

# Wait for Library screen
- extendedWaitUntil:
    visible:
      text: 'Library'
    timeout: 10000

# Verify clean state (0 items after fresh onboarding)
- assertVisible:
    text: '0 items'

# Add 3 unique test images to simulator's photo library
- addMedia:
    - ../assets/test-image-1.png
    - ../assets/test-image-2.png
    - ../assets/test-image-3.png

# Tap the add button to open the action sheet
- tapOn:
    id: 'library-add-button'

# Wait for action sheet to fully appear
- waitForAnimationToEnd

# Select "Choose from Photos"
- tapOn:
    id: 'action-choose-from-photos'

# Wait for photo library to appear (may take time to load on fresh simulator)
- extendedWaitUntil:
    visible:
      text: 'Photos'
    timeout: 30000

# Wait for photo grid to load
- waitForAnimationToEnd

# Android: Dismiss permission message if visible
- runFlow:
    when:
      visible:
        text: 'Dismiss'
    commands:
      - tapOn:
          text: 'Dismiss'
      - waitForAnimationToEnd

# Select multiple photos by tapping on different photos in the grid
# iOS photos are at y=30% (first row after clearing stock photos), Android at y=45%
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          point: '17%,30%'
      - tapOn:
          point: '50%,30%'
      - tapOn:
          point: '83%,30%'
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          point: '17%,45%'
      - tapOn:
          point: '50%,45%'
      - tapOn:
          point: '83%,45%'

# Wait for selection UI to update
- waitForAnimationToEnd

# iOS: Tap Add button / Android: Tap Done button
- runFlow:
    when:
      visible:
        text: 'Add'
    commands:
      - tapOn:
          text: 'Add'
- runFlow:
    when:
      visible:
        text: 'Done'
    commands:
      - tapOn:
          text: 'Done'

# Wait to return to Library screen
- extendedWaitUntil:
    visible:
      text: 'Library'
    timeout: 15000

# Verify exactly 3 files were added
- assertVisible:
    text: '3 items'

# Wait for at least one upload to complete (10 minute timeout)
# Files go through queued -> packing -> uploading -> uploaded states
- extendedWaitUntil:
    visible:
      id: 'upload-status-uploaded'
    timeout: 600000

# Verify no upload errors
- assertNotVisible:
    id: 'upload-status-error'
