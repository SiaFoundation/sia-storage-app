[package]
versioned_files = ["apps/mobile/package.json"]
changelog = "apps/mobile/CHANGELOG.md"

[github]
owner = "SiaFoundation"
repo = "sia-storage-app"

[[workflows]]
name = "prepare-release"

[[workflows.steps]]
type = "Command"
command = "git switch -c release"

[[workflows.steps]]
type = "PrepareRelease"
ignore_conventional_commits = true

[[workflows.steps]]
type = "Command"
command = "bun apps/mobile/scripts/syncAppVersion.ts"

[[workflows.steps]]
type = "Command"
command = "git add -A"

[[workflows.steps]]
type = "Command"
command = "git commit -m \"chore: release v$version\""

[[workflows.steps]]
type = "Command"
command = "git push --force --set-upstream origin release"

[[workflows.steps]]
type = "CreatePullRequest"
base = "main"

[workflows.steps.title]
template = "chore: release v$version"

[workflows.steps.body]
template = """
## Release v$version

$changelog

---
Merging this PR will create a GitHub release.
"""

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"
