name: Release CLI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_to_latest_release:
        description: 'Attach the built binaries to the latest cli/ release (semver). Off = build only, artifacts stay on the run.'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Run on every cli/v* release and on every manual dispatch. Skip mobile/*
    # releases so this workflow doesn't fire alongside the mobile build.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'cli/')) }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      # Each target builds on a runner whose OS/arch matches it natively, so
      # `bun install` pulls in the matching `@siafoundation/sia-storage-*`
      # native NAPI addon and `bun build --compile` embeds it. Cross-compiling
      # to a foreign platform would leave the addon out of node_modules and
      # produce a binary that throws `Native addon not found` at runtime.
      matrix:
        include:
          - name: darwin-arm64
            target: bun-darwin-arm64
            runs-on: macos-latest
          - name: linux-x64
            target: bun-linux-x64
            runs-on: ubuntu-latest
          - name: linux-arm64
            target: bun-linux-arm64
            runs-on: ubuntu-24.04-arm
          - name: windows-x64
            target: bun-windows-x64
            runs-on: windows-latest
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build sia-storage-${{ matrix.name }}${{ matrix.ext }}
        working-directory: apps/cli
        shell: bash
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile dist/sia-storage-${{ matrix.name }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sia-storage-${{ matrix.name }}
          path: apps/cli/dist/sia-storage-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  upload:
    # Attach binaries on real release events, or on manual dispatch when the
    # operator opts in. Lets us re-attach assets to the latest release after a
    # failed/edited build without cutting a new tag (the original workflow run
    # can't be re-run once its artifacts expire).
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_latest_release) }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Resolve target release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$EVENT_TAG"
          else
            # Highest semver among cli/v* releases. `gh release list --latest`
            # would pick the newest release of any kind (including mobile/).
            TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
              --json tagName \
              --jq '.[] | .tagName | select(startswith("cli/v"))' \
              | sort -V | tail -n1)
            if [ -z "$TAG" ]; then
              echo "No cli/v* release found to upload to."
              exit 1
            fi
          fi
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null \
            || { echo "Release $TAG not found."; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        # --clobber lets re-runs replace assets cleanly if the workflow
        # is restarted after a partial upload. --repo is required because
        # this job has no checkout, so gh can't infer the repo from git.
        run: gh release upload "$TAG" dist/sia-storage-* --clobber --repo "$GITHUB_REPOSITORY"
