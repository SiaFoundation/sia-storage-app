name: PR

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# cancel previous runs when the PR is updated
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: tenki-standard-autoscale
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun run test

  e2e-ios:
    runs-on: macos-latest
    if: github.event.action != 'closed'
    env:
      XCODE_VERSION: '16.2'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
      - name: Build iOS
        run: bun run ci-test-build:ios
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Boot iOS Simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/.*(\([^)]*\)).*/\1/')
          xcrun simctl boot "$DEVICE" || true
      - name: Run E2E tests
        run: bun run ci-e2e:ios onboarding.yml
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-results
          path: test/e2e/.maestro/tests/

  e2e-android:
    runs-on: tenki-standard-autoscale
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Android
        run: bun run ci-test-build:android
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-x86_64-31
      - name: Create AVD and run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_6
          script: bun run ci-e2e:android onboarding.yml
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-android-results
          path: test/e2e/.maestro/tests/
