name: PR

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# cancel previous runs when the PR is updated
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: tenki-standard-autoscale
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - name: Test
        run: bun run test
        shell: bash

  build-ios:
    runs-on: macos-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19

      - name: Build iOS
        run: bun run ci-test-build:ios
        shell: bash

  build-android:
    runs-on: tenki-standard-autoscale
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19

      - name: Build Android
        run: bun run ci-test-build:android
        shell: bash
