name: PR

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# cancel previous runs when the PR is updated
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun run lint

  knip:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun run knip

  typecheck:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun run typecheck

  test-core:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun --cwd packages/core test

  test-mobile:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun --cwd apps/mobile test

  test-integration:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun --cwd apps/integration test

  test-cli:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun --cwd apps/cli test

  test-cli-e2e:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - run: bun --cwd apps/cli test:e2e

  build-cli:
    # Verify each release target builds cleanly on its native runner. We
    # match the release workflow's matrix so PR runs catch the same failure
    # modes the release would hit.
    runs-on: ${{ matrix.runs-on }}
    if: github.event.action != 'closed'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            runs-on: macos-latest
          - name: darwin-x64
            runs-on: macos-13
          - name: linux-x64
            runs-on: ubuntu-latest
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
          - name: windows-x64
            runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19
      - working-directory: apps/cli
        shell: bash
        run: bun run build:${{ matrix.name }}
