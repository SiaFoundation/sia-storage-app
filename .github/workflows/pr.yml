name: PR

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: tenki-standard-autoscale
    if: ${{ github.event.action != 'closed' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test

  e2e-ios:
    runs-on: macos-15
    if: ${{ github.event.action != 'closed' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Cache native builds
        id: cache-native
        uses: actions/cache@v4
        with:
          path: |
            ios
            ~/Library/Developer/Xcode/DerivedData
          key: ios-${{ runner.os }}-${{ hashFiles('package.json', 'bun.lock', 'app.config.js', 'eas.json', 'plugins/**') }}

      - name: Prebuild
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: bunx expo prebuild --platform ios

      - name: Build iOS
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: bun run ios:build:sim

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/.*(\\([^)]*\\)).*/\\1/')
          xcrun simctl boot "$DEVICE" || true

      - name: Install app
        run: |
          APP=$(find ios/build ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*Debug-iphonesimulator*" -type d 2>/dev/null | head -1)
          xcrun simctl install booted "$APP"

      - name: Start Metro
        run: bun run start &

      - name: Wait for Metro
        run: timeout 120 bash -c 'until curl -s http://localhost:8081/status | grep -q "packager-status:running"; do sleep 2; done'

      - name: Run E2E tests
        env:
          E2E_CONNECT_KEY: ${{ secrets.E2E_CONNECT_KEY }}
        run: bun test/e2e/run.ts

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-results
          path: test/e2e/.maestro/tests/
          retention-days: 7

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ iOS E2E Test Failed\n\n[View logs and download screenshots](${runUrl})`
            });

  e2e-android:
    runs-on: ubuntu-latest
    if: ${{ github.event.action != 'closed' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Cache native builds
        id: cache-native
        uses: actions/cache@v4
        with:
          path: android
          key: android-${{ runner.os }}-${{ hashFiles('package.json', 'bun.lock', 'app.config.js', 'eas.json', 'plugins/**') }}

      - name: Prebuild
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: bunx expo prebuild --platform android

      - name: Build Android
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: |
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start emulator and run E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb wait-for-device
            APK=$(find android -name "*.apk" -path "*debug*" | head -1)
            adb install "$APK"
            bun run start &
            timeout 120 bash -c 'until curl -s http://localhost:8081/status | grep -q "packager-status:running"; do sleep 2; done'
            $HOME/.maestro/bin/maestro test test/e2e/flows/onboarding.yml -e E2E_CONNECT_KEY=${{ secrets.E2E_CONNECT_KEY }} --output test/e2e/.maestro/tests
        env:
          E2E_CONNECT_KEY: ${{ secrets.E2E_CONNECT_KEY }}

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-results
          path: test/e2e/.maestro/tests/
          retention-days: 7

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Android E2E Test Failed\n\n[View logs and download screenshots](${runUrl})`
            });
