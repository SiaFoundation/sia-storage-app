name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: both
      variant:
        description: 'App variant to release'
        required: true
        type: choice
        options:
          - both
          - prod
          - beta
        default: both
      track:
        description: 'Release track'
        required: true
        type: choice
        options:
          - internal
          - production
        default: internal
      dry_run:
        description: 'Build only — skip store upload (for verifying CI changes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # On a published `mobile/` release, both variants build from the SAME commit:
  #   prod (sia.storage)      → TestFlight + Play internal — promoted to the store manually
  #   beta (sia.storage.beta) → TestFlight + Play internal — never promoted
  # Manual dispatch can target a single variant via the `variant` input.
  release-android:
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'mobile/')) || inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ (github.event_name == 'workflow_dispatch' && inputs.variant != 'both') && fromJSON(format('["{0}"]', inputs.variant)) || fromJSON('["prod", "beta"]') }}
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: false
          tool-cache: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('bun.lock', 'apps/mobile/package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19

      - name: Setup Ruby
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      # The beta app reuses the same upload keystore as prod (Play allows one
      # upload key across apps), so no separate keystore secret is needed.
      - name: Decode Android keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android-release.keystore
        shell: bash

      - name: Release Android
        working-directory: apps/mobile
        env:
          APP_VARIANT: ${{ matrix.variant }}
          SIA_RELEASE_STORE_FILE: ${{ github.workspace }}/apps/mobile/android-release.keystore
          SIA_RELEASE_STORE_PASSWORD: ${{ secrets.SIA_RELEASE_STORE_PASSWORD }}
          SIA_RELEASE_KEY_ALIAS: ${{ secrets.SIA_RELEASE_KEY_ALIAS }}
          SIA_RELEASE_KEY_PASSWORD: ${{ secrets.SIA_RELEASE_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_JSON }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CI: true
        run: bun scripts/releaseAndroid.ts ${{ inputs.track || 'internal' }}
        shell: bash

  release-ios:
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'mobile/')) || inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ (github.event_name == 'workflow_dispatch' && inputs.variant != 'both') && fromJSON(format('["{0}"]', inputs.variant)) || fromJSON('["prod", "beta"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26.2'

      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun_version: 1.2.19

      - name: Setup Ruby
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      # The distribution certificate is team-wide, so both variants reuse it.
      - name: Install Apple certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          printf '%s' "$IOS_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add keychain to search list (prepend to existing list)
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

      # Provisioning profiles are per-app-id, so each variant installs its own.
      # Xcode matches profiles by their internal name (set in the Fastfile), not
      # the filename, so the on-disk names can stay constant.
      - name: Install provisioning profiles
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ matrix.variant == 'beta' && secrets.IOS_PROVISIONING_PROFILE_BETA_BASE64 || secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_EXTENSION_BASE64: ${{ matrix.variant == 'beta' && secrets.IOS_PROVISIONING_PROFILE_EXTENSION_BETA_BASE64 || secrets.IOS_PROVISIONING_PROFILE_EXTENSION_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "$PROFILES_DIR/SiaStorage.mobileprovision"
          printf '%s' "$IOS_PROVISIONING_PROFILE_EXTENSION_BASE64" | base64 -d > "$PROFILES_DIR/ShareExtension.mobileprovision"

      - name: Release iOS
        working-directory: apps/mobile
        env:
          APP_VARIANT: ${{ matrix.variant }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_JSON: ${{ secrets.APP_STORE_CONNECT_API_KEY_JSON }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CI: true
        run: |
          TRACK="${{ inputs.track || 'internal' }}"
          if [[ "$TRACK" == "internal" ]]; then
            bun scripts/releaseIos.ts testflight
          else
            bun scripts/releaseIos.ts appstore
          fi
        shell: bash

      - name: Sanitize dSYMs artifact name
        if: always()
        run: |
          TAG="${{ github.event.release.tag_name || github.run_id }}"
          echo "DSYM_ARTIFACT=ios-dsyms-${{ matrix.variant }}-${TAG//\//-}" >> "$GITHUB_ENV"
        shell: bash

      - name: Upload iOS dSYMs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.DSYM_ARTIFACT }}
          path: |
            apps/mobile/ios/build/**/*.dSYM
            apps/mobile/ios/build/**/*.dSYM.zip
            apps/mobile/ios/build/**/Symbols.zip
          if-no-files-found: warn
          retention-days: 7
